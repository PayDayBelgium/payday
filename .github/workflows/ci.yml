name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Lint is reporting-only for now: there is a backlog of pre-existing
      # errors (see docs/CODE-REVIEW-2026-06.md, Q1). Remove continue-on-error
      # once the backlog is cleared so lint becomes a hard gate.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
